# CI: проверка кода при Pull Request в master
# Запускается при открытии/обновлении PR в master и при push в master

name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  admin:
    name: Admin (lint & build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin/package-lock.json

      - name: Install dependencies
        working-directory: admin
        run: npm ci

      - name: Lint
        working-directory: admin
        run: npm run lint

      - name: Build
        working-directory: admin
        run: npm run build

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build
        working-directory: frontend
        run: npm run build

  backend:
    name: Backend (compile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compile (no tests)
        working-directory: backend
        run: mvn compile -DskipTests -q
